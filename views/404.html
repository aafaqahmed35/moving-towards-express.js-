<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eef2f7;
        }

        nav{
            background:#1e293b;
            padding:18px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:white;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:700px;
            margin:80px auto;
            background:white;
            padding:50px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
            text-align:center;
        }

        h1{
            font-size:80px;
            color:#ef4444;
            margin-bottom:10px;
        }

        h2{
            color:#1e293b;
            margin-bottom:20px;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<nav>

    <h2>Express Shop</h2>

    <div>
        <a href="/">Home</a>
        <a href="/add-product">Add Product</a>
    </div>

</nav>

<div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you're looking for doesn't exist or may have been moved.
    </p>

    <a class="btn" href="/">
        Return to Home
    </a>

</div>

</body>
</html>
