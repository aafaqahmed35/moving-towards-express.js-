<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eef2f7;
        }

        nav{
            background:#1e293b;
            padding:18px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:white;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-weight:bold;
        }

        .container{
            width:450px;
            margin:70px auto;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#1e293b;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<nav>

    <h2>Express Shop</h2>

    <div>
        <a href="/">Home</a>
        <a href="/add-product">Add Product</a>
    </div>

</nav>

<div class="container">

    <h1>Add Product</h1>

    <form action="/product" method="POST">

        <label>Product Name</label>

        <input
            type="text"
            name="title"
            placeholder="Enter Product Name"
            required
        >

        <button type="submit">
            Add Product
        </button>

    </form>

</div>

</body>
</html>
